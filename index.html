<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV</title>
</head>
<body>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ancizar+Sans:ital,wght@0,100..1000;1,100..1000&family=Archivo+Black&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
        }

        .container {
            margin: 1;
            font-family: "Ancizar Sans", sans-serif;
            padding: 30px;
            width: 300px;
            border-radius: 10px;
            border: 2px rgba(80, 80, 80, 0.699) solid; 
            box-shadow: 10px 20px #70707056;
        }

        .container h4{
            color: rgb(2, 134, 61);
        }

        p.Details {
            width: 190px;
        }

        .container button {
            text-decoration: none;
            color: black;
            padding: 10px;
            border-radius: 20px;
            border: 1px black solid; 
            cursor: pointer;
        }

        .container button:hover {
            transform: scale(1.05);
            transition-delay: 0.2s ease-in-out;
        }


    </style>
